<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Chip body -->
  <rect x="8" y="8" width="16" height="16" rx="2" fill="#1e1e2e" stroke="#a0a0b0" stroke-width="1.5"/>

  <!-- Inner die -->
  <rect x="11" y="11" width="10" height="10" rx="1" fill="#2a2a3e" stroke="#6366f1" stroke-width="0.75"/>

  <!-- FPGA grid dots (4x4) -->
  <circle cx="13.5" cy="13.5" r="0.8" fill="#818cf8"/>
  <circle cx="16" cy="13.5" r="0.8" fill="#818cf8"/>
  <circle cx="18.5" cy="13.5" r="0.8" fill="#818cf8"/>
  <circle cx="13.5" cy="16" r="0.8" fill="#a78bfa"/>
  <circle cx="16" cy="16" r="0.8" fill="#a78bfa"/>
  <circle cx="18.5" cy="16" r="0.8" fill="#a78bfa"/>
  <circle cx="13.5" cy="18.5" r="0.8" fill="#818cf8"/>
  <circle cx="16" cy="18.5" r="0.8" fill="#818cf8"/>
  <circle cx="18.5" cy="18.5" r="0.8" fill="#818cf8"/>

  <!-- Pins - Top -->
  <rect x="11" y="4" width="1.5" height="4.5" rx="0.5" fill="#a0a0b0"/>
  <rect x="15.25" y="4" width="1.5" height="4.5" rx="0.5" fill="#a0a0b0"/>
  <rect x="19.5" y="4" width="1.5" height="4.5" rx="0.5" fill="#a0a0b0"/>

  <!-- Pins - Bottom -->
  <rect x="11" y="23.5" width="1.5" height="4.5" rx="0.5" fill="#a0a0b0"/>
  <rect x="15.25" y="23.5" width="1.5" height="4.5" rx="0.5" fill="#a0a0b0"/>
  <rect x="19.5" y="23.5" width="1.5" height="4.5" rx="0.5" fill="#a0a0b0"/>

  <!-- Pins - Left -->
  <rect x="4" y="11" width="4.5" height="1.5" rx="0.5" fill="#a0a0b0"/>
  <rect x="4" y="15.25" width="4.5" height="1.5" rx="0.5" fill="#a0a0b0"/>
  <rect x="4" y="19.5" width="4.5" height="1.5" rx="0.5" fill="#a0a0b0"/>

  <!-- Pins - Right -->
  <rect x="23.5" y="11" width="4.5" height="1.5" rx="0.5" fill="#a0a0b0"/>
  <rect x="23.5" y="15.25" width="4.5" height="1.5" rx="0.5" fill="#a0a0b0"/>
